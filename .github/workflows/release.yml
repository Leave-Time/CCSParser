name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "release*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-cross-platform:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
            archive_ext: tar.gz
          - os: macos-latest
            artifact_suffix: macos-arm64
            archive_ext: tar.gz
          - os: windows-latest
            artifact_suffix: windows-x86_64
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update || true
          sudo apt-get install -y libcurl4-openssl-dev pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install curl pkg-config

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install curl:x64-windows --triplet x64-windows
          Add-Content -Path $env:GITHUB_ENV  -Value "VCPKG_ROOT=$($env:VCPKG_INSTALLATION_ROOT -replace '\\','/')"
          Add-Content -Path $env:GITHUB_PATH -Value "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-version: '1.x'
          bazelrc: |
            build --host_cxxopt=-std=c++20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Test
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            CXX_STD="--cxxopt=/std:c++20"
            REPO_ENV="--repo_env=VCPKG_INSTALLATION_ROOT=${VCPKG_ROOT}"
            TEST_PATH="${VCPKG_ROOT}/installed/x64-windows/bin;C:/Windows/System32;C:/Windows/System32/WindowsPowerShell/v1.0"
            TEST_ENV="--test_env=PATH=${TEST_PATH}"
          else
            CXX_STD="--cxxopt=-std=c++20"
            REPO_ENV=""
            TEST_ENV=""
          fi
          bazel test //... --test_output=errors $CXX_STD $REPO_ENV $TEST_ENV

      - name: Build Tools
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            CXX_STD="--cxxopt=/std:c++20"
            REPO_ENV="--repo_env=VCPKG_INSTALLATION_ROOT=${VCPKG_ROOT}"
          else
            CXX_STD="--cxxopt=-std=c++20"
            REPO_ENV=""
          fi
          bazel build -c opt //:scoreboard_csv_dump //:eventfeed_scoreboard_preview $CXX_STD $REPO_ENV

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME:-$(git rev-parse --short HEAD)}
          ARCHIVE="CCSParser-${{ matrix.artifact_suffix }}-${VERSION}.tar.gz"
          BIN_DIR=$(bazel info bazel-bin)
          mkdir -p pkg
          cp "${BIN_DIR}/scoreboard_csv_dump" pkg/
          cp "${BIN_DIR}/eventfeed_scoreboard_preview" pkg/
          cp README.md pkg/
          mkdir -p dist
          tar -czf "dist/${ARCHIVE}" -C pkg .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { git rev-parse --short HEAD }
          $archive = "CCSParser-${{ matrix.artifact_suffix }}-$version.zip"
          $binDir = (bazel info bazel-bin).Trim()
          New-Item -ItemType Directory -Force -Path pkg | Out-Null
          Copy-Item "$binDir\scoreboard_csv_dump.exe" pkg\
          Copy-Item "$binDir\eventfeed_scoreboard_preview.exe" pkg\
          Copy-Item "README.md" pkg\
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path pkg\* -DestinationPath "dist\$archive"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ matrix.os }}
          path: dist/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-cross-platform
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_archives
          pattern: release-artifacts-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all_archives/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
